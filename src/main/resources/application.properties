# --- JAX-RS root path ---
# The old WildFly deployment was at /simple-service-webapp with @ApplicationPath("/webapi").
# Quarkus merges both into a single root-path:
quarkus.http.root-path=/simple-service-webapp

# RESTEasy sub-path replaces @ApplicationPath
quarkus.resteasy.path=/webapi

# Default HTTP port (override with env var QUARKUS_HTTP_PORT)
quarkus.http.port=8085

# --- Pictures base directory ---
# Points to the repo-level pictures/ folder.
# Override with env var PICTURES_BASE_DIR in Kubernetes.
pictures.base-dir=../pictures

# --- Admin proxy ---
# Base URL for proxying /admin requests to dalogin.
# In K8s this is the Apache reverse proxy (WILDFLY_URL env var).
admin.service-url=${WILDFLY_URL:http://localhost:8888}

# --- GZIP compression ---
quarkus.http.enable-compression=true

# --- OpenTelemetry ---
quarkus.otel.enabled=true
quarkus.otel.traces.enabled=true
quarkus.otel.exporter.otlp.endpoint=http://localhost:4318
quarkus.otel.exporter.otlp.protocol=http/protobuf
quarkus.otel.traces.exporter=otlp
quarkus.otel.service.name=simple-service-webapp-quarkus
quarkus.otel.traces.sampler=parentbased_always_on

