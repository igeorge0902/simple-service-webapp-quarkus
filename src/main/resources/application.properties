# --- JAX-RS root path ---
# The old WildFly deployment was at /simple-service-webapp with @ApplicationPath("/webapi").
# Quarkus merges both into a single root-path:
quarkus.http.root-path=/simple-service-webapp

# RESTEasy sub-path replaces @ApplicationPath
quarkus.resteasy.path=/webapi

# Default HTTP port (override with env var QUARKUS_HTTP_PORT)
quarkus.http.port=8085

# --- Pictures base directory ---
# Points to the repo-level pictures/ folder.
# Override with env var PICTURES_BASE_DIR in Kubernetes.
pictures.base-dir=../pictures

# --- GZIP compression ---
quarkus.http.enable-compression=true

